<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirinyaga Hostels - Find Your Perfect Student Accommodation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
            line-height: 1.6;
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navbar */
        .navbar {
            padding: 20px 0;
            margin-bottom: 40px;
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 0;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, var(--light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
        }

        /* Search Box */
        .search-box {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
        }

        .search-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
        }

        .search-input:focus {
            outline: 2px solid var(--primary);
        }

        /* Filters */
        .filters {
            margin: 40px 0;
            padding: 20px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .filter-select {
            padding: 12px;
            border: 1px solid var(--gray);
            border-radius: 10px;
            font-size: 14px;
        }

        .range-slider {
            padding: 10px 0;
        }

        /* Hostel Grid */
        .hostel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }

        .hostel-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .hostel-card:hover {
            transform: translateY(-10px);
        }

        .hostel-image {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .hostel-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .verified-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--success);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .hostel-details {
            padding: 20px;
        }

        .hostel-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .hostel-meta {
            display: flex;
            justify-content: space-between;
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 15px;
        }

        .hostel-price {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .hostel-price span {
            font-size: 14px;
            color: var(--gray);
            font-weight: 400;
        }

        .hostel-rating {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--accent);
            font-weight: 600;
        }

        .stars {
            color: var(--accent);
            letter-spacing: 2px;
        }

        /* Loading Spinner */
        .loader {
            border: 4px solid var(--light);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Dark Mode */
        .dark-mode {
            --glass-bg: rgba(30, 41, 59, 0.95);
            --dark: #f8fafc;
            --light: #1e293b;
        }

        .dark-mode-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 36px;
            }
            
            .nav-links {
                display: none;
            }
            
            .hostel-grid {
                grid-template-columns: 1fr;
            }
            
            .search-form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="dark-mode-toggle" onclick="toggleDarkMode()">🌙</div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">Kirinyaga Hostels</div>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="#hostels">Hostels</a>
                <a href="#roommate">Roommate Finder</a>
                <a href="#contact">Contact</a>
                <button class="btn btn-outline" onclick="window.location.href='login.html'">Login</button>
                <button class="btn btn-primary" onclick="window.location.href='signup.html'">Sign Up</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>Find Your Perfect Student Home</h1>
            <p>Discover verified hostels near Kirinyaga University with 360° tours, transparent pricing, and secure booking</p>
            
            <div class="search-box glass">
                <form class="search-form" onsubmit="searchHostels(event)">
                    <input type="text" class="search-input" id="searchInput" placeholder="Search by hostel name, location, or amenities...">
                    <button type="submit" class="btn btn-primary">Search</button>
                </form>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="filters glass">
            <h3>Filters</h3>
            <div class="filter-grid">
                <select class="filter-select" id="hostelType">
                    <option value="">All Types</option>
                    <option value="bedsitter">Bedsitter</option>
                    <option value="single">Single Room</option>
                    <option value="one_bedroom">One Bedroom</option>
                    <option value="studio">Studio</option>
                </select>

                <select class="filter-select" id="maxDistance">
                    <option value="">Max Distance</option>
                    <option value="1">Within 1 km</option>
                    <option value="2">Within 2 km</option>
                    <option value="5">Within 5 km</option>
                    <option value="10">Within 10 km</option>
                </select>

                <select class="filter-select" id="sortBy">
                    <option value="rent">Price: Low to High</option>
                    <option value="-rent">Price: High to Low</option>
                    <option value="distance_to_university">Distance: Nearest First</option>
                    <option value="-average_rating">Rating: High to Low</option>
                </select>

                <div class="range-slider">
                    <label>Max Rent: KES <span id="rentValue">50000</span></label>
                    <input type="range" id="maxRent" min="0" max="100000" value="50000" step="1000" oninput="updateRentValue(this.value)">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <h4>Amenities</h4>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 10px;">
                    <label><input type="checkbox" value="wifi" class="amenity-filter"> WiFi</label>
                    <label><input type="checkbox" value="water" class="amenity-filter"> Water</label>
                    <label><input type="checkbox" value="security" class="amenity-filter"> Security</label>
                    <label><input type="checkbox" value="parking" class="amenity-filter"> Parking</label>
                    <label><input type="checkbox" value="furniture" class="amenity-filter"> Furniture</label>
                </div>
            </div>
        </div>

        <div id="hostelGrid" class="hostel-grid">
            <!-- Hostels will be loaded here -->
            <div class="loader"></div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE_URL = 'https://your-oracle-backend.com/api';
        const GOOGLE_MAPS_API_KEY = 'AIzaSyBizaLbe_k0W-xEOBEhkNFcwZPC8eFl-OQ';

        // State
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;
        let filters = {
            type: '',
            maxDistance: '',
            maxRent: 50000,
            amenities: [],
            sort: 'rent'
        };

        // Dark Mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Load dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // Update rent display
        function updateRentValue(value) {
            document.getElementById('rentValue').textContent = value;
            filters.maxRent = value;
            loadHostels(true);
        }

        // Search hostels
        function searchHostels(event) {
            event.preventDefault();
            const searchTerm = document.getElementById('searchInput').value;
            filters.search = searchTerm;
            loadHostels(true);
        }

        // Load hostels from API
        async function loadHostels(reset = false) {
            if (isLoading) return;
            
            if (reset) {
                currentPage = 1;
                hasMore = true;
                document.getElementById('hostelGrid').innerHTML = '<div class="loader"></div>';
            }

            isLoading = true;

            // Build query string
            const params = new URLSearchParams({
                page: currentPage,
                page_size: 20,
                ...filters
            });

            // Add amenities
            filters.amenities.forEach(amenity => params.append('amenities', amenity));

            try {
                const response = await fetch(`${API_BASE_URL}/hostels/?${params}`);
                const data = await response.json();

                if (reset) {
                    document.getElementById('hostelGrid').innerHTML = '';
                }

                if (data.results && data.results.length > 0) {
                    renderHostels(data.results);
                    currentPage++;
                    hasMore = !!data.next;
                } else {
                    if (reset) {
                        document.getElementById('hostelGrid').innerHTML = '<p style="text-align: center; grid-column: 1/-1;">No hostels found</p>';
                    }
                    hasMore = false;
                }
            } catch (error) {
                console.error('Error loading hostels:', error);
                document.getElementById('hostelGrid').innerHTML = '<p style="color: var(--danger); text-align: center;">Error loading hostels. Please try again.</p>';
            } finally {
                isLoading = false;
            }
        }

        // Render hostels
        function renderHostels(hostels) {
            const grid = document.getElementById('hostelGrid');
            
            hostels.forEach(hostel => {
                const card = document.createElement('div');
                card.className = 'hostel-card glass';
                card.onclick = () => window.location.href = `hostel-details.html?id=${hostel.id}`;
                
                card.innerHTML = `
                    <div class="hostel-image">
                        <img src="${hostel.primary_image || 'https://via.placeholder.com/400x200'}" alt="${hostel.name}">
                        ${hostel.owner_verified ? '<span class="verified-badge">✓ Verified</span>' : ''}
                    </div>
                    <div class="hostel-details">
                        <div class="hostel-name">${hostel.name}</div>
                        <div class="hostel-meta">
                            <span>${hostel.hostel_type}</span>
                            <span>📍 ${hostel.distance_to_university} km from Uni</span>
                        </div>
                        <div class="hostel-price">
                            KES ${parseInt(hostel.rent).toLocaleString()} <span>/month</span>
                        </div>
                        <div class="hostel-rating">
                            <span class="stars">${'★'.repeat(Math.round(hostel.average_rating))}${'☆'.repeat(5-Math.round(hostel.average_rating))}</span>
                            <span>(${hostel.rating_count || 0} reviews)</span>
                        </div>
                        <div style="color: var(--gray); font-size: 14px; margin-top: 10px;">
                            Owner: ${hostel.owner_name}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Infinite scroll
        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 1000) {
                if (hasMore && !isLoading) {
                    loadHostels();
                }
            }
        });

        // Event listeners for filters
        document.getElementById('hostelType').addEventListener('change', (e) => {
            filters.type = e.target.value;
            loadHostels(true);
        });

        document.getElementById('maxDistance').addEventListener('change', (e) => {
            filters.maxDistance = e.target.value;
            loadHostels(true);
        });

        document.getElementById('sortBy').addEventListener('change', (e) => {
            filters.sort = e.target.value;
            loadHostels(true);
        });

        document.querySelectorAll('.amenity-filter').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                if (e.target.checked) {
                    filters.amenities.push(e.target.value);
                } else {
                    filters.amenities = filters.amenities.filter(a => a !== e.target.value);
                }
                loadHostels(true);
            });
        });

        // Get user location for distance-based search
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    filters.lat = position.coords.latitude;
                    filters.lng = position.coords.longitude;
                    loadHostels(true);
                },
                (error) => {
                    console.log('Location access denied');
                    loadHostels(true);
                }
            );
        } else {
            loadHostels(true);
        }

        // Load Google Maps
        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places`;
            script.async = true;
            document.head.appendChild(script);
        }
        loadGoogleMaps();
    </script>
</body>
</html>
