<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Kirinyaga Hostels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            color: var(--dark);
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #d1e7dd;
            color: #0f5132;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
        }

        .otp-input:focus {
            border-color: var(--primary);
        }

        .timer {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary);
            margin: 20px 0;
            text-align: center;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Kirinyaga Hostels</div>
        <h2>Reset Password</h2>
        <div class="subtitle">Enter your email to receive a password reset code</div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Step 1: Email Input -->
        <div id="step1" class="step active">
            <form onsubmit="handleResetRequest(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your registered email">
                </div>

                <button type="submit" class="btn" id="requestBtn">
                    <span class="loader" id="requestLoader" style="display: none;"></span>
                    <span id="requestText">Send Reset Code</span>
                </button>
            </form>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step2" class="step">
            <div class="subtitle">We've sent a 6-digit code to your email</div>
            
            <div class="otp-inputs">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 1)" id="otp1">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 2)" id="otp2">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 3)" id="otp3">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 4)" id="otp4">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 5)" id="otp5">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 6)" id="otp6">
            </div>

            <div class="timer" id="timer">05:00</div>

            <button class="btn" onclick="verifyOTP()" id="verifyBtn">Verify Code</button>
            
            <button class="btn btn-outline" onclick="resendOTP()" id="resendBtn" style="margin-top: 15px;">Resend Code</button>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3" class="step">
            <div class="subtitle">Create a new password</div>

            <form onsubmit="handlePasswordReset(event)">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required placeholder="Enter new password">
                    <ul style="font-size: 12px; color: var(--gray); margin-top: 5px; padding-left: 15px;">
                        <li>At least 8 characters</li>
                        <li>One uppercase letter</li>
                        <li>One lowercase letter</li>
                        <li>One number</li>
                        <li>One special character</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Re-enter new password">
                </div>

                <button type="submit" class="btn" id="resetBtn">
                    <span class="loader" id="resetLoader" style="display: none;"></span>
                    <span id="resetText">Reset Password</span>
                </button>
            </form>
        </div>

        <div class="links">
            <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://your-oracle-backend.com/api';
        let userEmail = '';
        let resetToken = '';
        let timerInterval = null;
        let timeLeft = 300; // 5 minutes

        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                const next = document.getElementById(`otp${nextId}`);
                if (next) {
                    next.focus();
                }
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').textContent = '00:00';
                    document.getElementById('verifyBtn').disabled = true;
                    document.getElementById('resendBtn').disabled = false;
                }
            }, 1000);
        }

        async function handleResetRequest(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            userEmail = email;

            // Show loading
            document.getElementById('requestLoader').style.display = 'inline-block';
            document.getElementById('requestText').textContent = ' Sending...';
            document.getElementById('requestBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/password-reset/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    // Move to OTP step
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                    
                    // Start timer
                    timeLeft = 300;
                    startTimer();
                    
                    showSuccess('Reset code sent to your email');
                } else {
                    const data = await response.json();
                    showError(data.error || 'Failed to send reset code');
                }
            } catch (error) {
                console.error('Password reset request error:', error);
                showError('Network error. Please try again.');
            } finally {
                document.getElementById('requestLoader').style.display = 'none';
                document.getElementById('requestText').textContent = 'Send Reset Code';
                document.getElementById('requestBtn').disabled = false;
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp1').value +
                       document.getElementById('otp2').value +
                       document.getElementById('otp3').value +
                       document.getElementById('otp4').value +
                       document.getElementById('otp5').value +
                       document.getElementById('otp6').value;

            if (otp.length !== 6) {
                showError('Please enter the 6-digit code');
                return;
            }

            resetToken = otp;
            
            // Move to password reset step
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            
            // Clear timer
            clearInterval(timerInterval);
        }

        async function handlePasswordReset(event) {
            event.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Show loading
            document.getElementById('resetLoader').style.display = 'inline-block';
            document.getElementById('resetText').textContent = ' Resetting...';
            document.getElementById('resetBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/password-reset-confirm/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        new_password: newPassword,
                        new_password_confirm: confirmPassword
                    })
                });

                if (response.ok) {
                    showSuccess('Password reset successful! Redirecting to login...');
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    const data = await response.json();
                    showError(data.error || 'Failed to reset password');
                }
            } catch (error) {
                console.error('Password reset error:', error);
                showError('Network error. Please try again.');
            } finally {
                document.getElementById('resetLoader').style.display = 'none';
                document.getElementById('resetText').textContent = 'Reset Password';
                document.getElementById('resetBtn').disabled = false;
            }
        }

        async function resendOTP() {
            document.getElementById('resendBtn').disabled = true;
            document.getElementById('resendBtn').textContent = 'Sending...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/password-reset/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: userEmail })
                });

                if (response.ok) {
                    // Reset timer
                    timeLeft = 300;
                    document.getElementById('verifyBtn').disabled = false;
                    showSuccess('New reset code sent');
                } else {
                    showError('Failed to resend code');
                }
            } catch (error) {
                console.error('Resend error:', error);
                showError('Network error. Please try again.');
            } finally {
                document.getElementById('resendBtn').disabled = false;
                document.getElementById('resendBtn').textContent = 'Resend Code';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
